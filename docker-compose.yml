# Entorno de referencia (desarrollo / demo). Ajusta variables y secretos antes de producción.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_trabajo
    ports:
      - "5432:5432"
    volumes:
      - ferragro_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/db_trabajo
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:2711,http://127.0.0.1:2711,http://localhost
      CORS_ALLOW_PRIVATE_NETWORK: "true"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # El navegador del usuario debe alcanzar el API; con compose, nginx del front reenvía /api al servicio backend.
        VITE_API_URL: ""
        VITE_API_PREFIX: /api/v1
    ports:
      - "2711:80"
    depends_on:
      - backend

volumes:
  ferragro_pg_data:
