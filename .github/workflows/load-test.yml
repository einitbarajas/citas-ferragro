# Smoke de carga: PostgreSQL + uvicorn + Locust en el mismo job (la API vive hasta terminar Locust).
# Ejecución manual desde Actions → "Load test (Locust)" → Run workflow.
# Falla si Locust termina con errores HTTP (mismo criterio que en local).
name: Load test (Locust)

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Usuarios concurrentes de Locust"
        default: "4"
        required: false
      spawn_rate:
        description: "Usuarios nuevos por segundo (ramp-up)"
        default: "1"
        required: false
      run_time:
        description: "Duración (ej. 15s, 2m)"
        default: "20s"
        required: false

concurrency:
  group: ferragro-load-test
  cancel-in-progress: true

jobs:
  locust-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: db_trabajo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d db_trabajo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/db_trabajo
      SECRET_KEY: ci-load-test-secret-min-32-chars-required
      RATE_LIMIT_ENABLED: "false"
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: db_trabajo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Apply DB schema (init scripts)
        working-directory: ${{ github.workspace }}
        run: |
          for f in db/init/001_schema.sql db/init/002_audit_triggers.sql db/init/003_historial_id_actor_drop_fk.sql; do
            echo "Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Install Python dependencies (app + Locust)
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Start API, run Locust, stop API
        working-directory: backend
        env:
          USERS: ${{ github.event.inputs.users }}
          SPAWN: ${{ github.event.inputs.spawn_rate }}
          DURATION: ${{ github.event.inputs.run_time }}
        run: |
          set -euo pipefail
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          UV_PID=$!

          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "API ready after ${i}s"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "API did not become healthy in time"
              kill "$UV_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          U="${USERS:-4}"
          S="${SPAWN:-1}"
          T="${DURATION:-20s}"
          echo "Locust: users=$U spawn_rate=$S run_time=$T"

          set +e
          locust -f load_tests/locustfile.py \
            --host=http://127.0.0.1:8000 \
            --headless \
            -u "$U" \
            -r "$S" \
            -t "$T"
          LOCUST_EXIT=$?
          set -e

          kill "$UV_PID" 2>/dev/null || true
          wait "$UV_PID" 2>/dev/null || true
          exit "$LOCUST_EXIT"
