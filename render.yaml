# Render Blueprint: PostgreSQL + API FastAPI.
# Tras el primer despliegue, define CORS_ORIGINS con la URL HTTPS de Vercel.
databases:
  - name: ferragro-db
    databaseName: ferragro
    user: ferragro
    plan: free

services:
  - type: web
    name: ferragro-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ferragro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: PYTHON_VERSION
        value: 3.12.8
